syntax = "proto3";

package dscc_raft;

service RaftService {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendRequest) returns (AppendResponse);
  rpc InstallSnapshot(SnapshotRequest) returns (SnapshotResponse);
  rpc GetLeader(LeaderQuery) returns (LeaderInfo);
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message LogEntry {
  enum OpType {
    ACQUIRE = 0;
    RELEASE = 1;
  }

  int64 term = 1;
  OpType op_type = 2;
  string agent_id = 3;
  repeated float embedding = 4;
  float theta = 5;
}

message AppendRequest {
  int64 term = 1;
  string leader_id = 2;
  string leader_service_address = 3;
  int64 prev_log_index = 4;
  int64 prev_log_term = 5;
  repeated LogEntry entries = 6;
  int64 leader_commit = 7;
}

message AppendResponse {
  int64 term = 1;
  bool success = 2;
  int64 match_index = 3;
  int64 conflict_term = 4;
  int64 conflict_index = 5;
}

message SnapshotRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 last_included_index = 3;
  int64 last_included_term = 4;
  bytes data = 5;
}

message SnapshotResponse {
  int64 term = 1;
}

message LeaderQuery {}

message LeaderInfo {
  string leader_id = 1;
  string leader_address = 2;
  int64 current_term = 3;
  bool is_leader = 4;
}
