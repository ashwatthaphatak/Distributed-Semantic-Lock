// Defines the gRPC contract between the end-to-end bench and dscc-node.
// AcquireGuard carries embeddings plus trace metadata used in the demo output.
// The generated protobuf files are built from this schema.

syntax = "proto3";

package dscc;

service LockService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc AcquireGuard(AcquireRequest) returns (AcquireResponse);
  rpc ReleaseGuard(ReleaseRequest) returns (ReleaseResponse);
}

message PingRequest {
  string from_node = 1;
}

message PingResponse {
  string message = 1;
}

message AcquireRequest {
  enum OperationType {
    OPERATION_TYPE_UNSPECIFIED = 0;
    OPERATION_TYPE_WRITE = 1;
    OPERATION_TYPE_READ = 2;
  }

  string agent_id = 1;
  repeated float embedding = 2;
  string payload_text = 3;
  string source_file = 4;
  int64 timestamp_unix_ms = 5;
  OperationType operation_type = 6;
}

message AcquireResponse {
  bool granted = 1;
  string message = 2;
  int64 server_received_unix_ms = 3;
  int64 lock_acquired_unix_ms = 4;
  int64 qdrant_write_complete_unix_ms = 5;
  int64 lock_released_unix_ms = 6;
  int64 lock_wait_ms = 7;
  float blocking_similarity_score = 8;
  string blocking_agent_id = 9;
  string leader_redirect = 10;
  string serving_node_id = 11;
  int32 wait_position = 12;
  int32 wake_count = 13;
  int32 queue_hops = 14;
  int32 active_lock_count = 15;
}

message ReleaseRequest {
  string agent_id = 1;
}

message ReleaseResponse {
  bool success = 1;
}
